{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">New Budget</h2>

<form method="post" class="card card-body shadow-sm">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Project</label>
            <input type="text" name="project" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Budget Code</label>
            <input type="text" name="budget_code" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">Amount</label>
            <input type="number" step="0.01" name="amount" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Used Amount</label>
            <input type="number" step="0.01" name="used_amount" class="form-control" value="0">
        </div>
        <div class="col-md-3">
            <label class="form-label">Fiscal Year</label>
            <input type="number" name="fiscal_year" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Owner</label>
            <input type="text" name="owner" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Remark</label>
            <input type="text" name="remark" class="form-control">
        </div>
    </div>

    <div class="mt-3">
        <button class="btn btn-primary">บันทึก</button>
    </div>
</form>
{% endblock %}
