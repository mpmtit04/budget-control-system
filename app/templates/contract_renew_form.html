{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Renew Contract</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="mb-3">
            <strong>Vendor:</strong> {{ contract.vendor }}<br>
            <strong>Contract:</strong> {{ contract.contract_name }}<br>
            <strong>Current End Date:</strong> {{ contract.end_date }}<br>
            <strong>Current Amount:</strong> {{ "{:,.2f}".format(contract.amount or 0) }}
        </div>

        <form method="post">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Renewal Date</label>
                    <input type="date" name="renewal_date" class="form-control" value="{{ today }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">New End Date</label>
                    <input type="date" name="new_end_date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Renewal Value</label>
                    <input type="number" step="0.01" name="renewal_value" class="form-control">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Remark</label>
                    <textarea name="remark" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="mt-3">
                <button class="btn btn-primary">Confirm Renewal</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
